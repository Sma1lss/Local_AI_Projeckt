<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Загрузка файла</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center font-sans">

<div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
    <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">Загрузка файла</h1>

    <form id="uploadForm" class="space-y-4">
        <div class="border-2 border-dashed border-gray-300 rounded-lg p-6 flex flex-col items-center justify-center hover:bg-gray-50 transition-colors">
            <svg class="w-12 h-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>

            <label class="cursor-pointer bg-blue-500 hover:bg-blue-600 text-white font-medium px-5 py-2 rounded-md transition-colors">
                Выбрать файл
                <input type="file" id="fileInput" class="hidden" required>
            </label>
            <p id="fileName" class="mt-3 text-sm text-gray-500 text-center"></p>
        </div>

        <button type="submit" class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-2.5 rounded-md transition-colors">
            Отправить на сервер
        </button>
    </form>

    <div id="status" class="mt-4 text-center text-sm font-medium hidden"></div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const fileNameDisplay = document.getElementById('fileName');
    const uploadForm = document.getElementById('uploadForm');
    const statusDiv = document.getElementById('status');

    // Показываем имя выбранного файла
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            fileNameDisplay.textContent = e.target.files[0].name;
        }
    });

    // Обрабатываем отправку формы
    uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault(); // Отменяем стандартную перезагрузку страницы

        const file = fileInput.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        // Показываем статус загрузки
        statusDiv.className = 'mt-4 text-center text-sm text-blue-500 block';
        statusDiv.textContent = 'Загрузка...';

        try {
            // Отправляем файл на наш Java сервер
            const response = await fetch('/api/upload', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                statusDiv.className = 'mt-4 text-center text-sm text-green-600 block';
                statusDiv.textContent = 'Файл успешно загружен!';
                uploadForm.reset(); // Очищаем форму
                fileNameDisplay.textContent = '';
            } else {
                statusDiv.className = 'mt-4 text-center text-sm text-red-500 block';
                statusDiv.textContent = 'Ошибка загрузки файла.';
            }
        } catch (error) {
            statusDiv.className = 'mt-4 text-center text-sm text-red-500 block';
            statusDiv.textContent = 'Ошибка соединения с сервером.';
        }
    });
</script>
</body>
</html>
