version: "3.9"
services:
  fsss-edge:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: edge
      FSSS_API_KEY: change-me
      FSSS_SANDBOX_URL: http://scanner-sandbox:8081/internal/scan
      FSSS_DOWNSTREAM_URL: http://host.docker.internal:8090/files
      FSSS_CLAMAV_HOST: clamav
    depends_on:
      - scanner-sandbox
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp
      - /fsss-spool
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  scanner-sandbox:
    build: .
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      FSSS_API_KEY: change-me
      FSSS_CLAMAV_HOST: clamav
    depends_on:
      - clamav
    expose:
      - "8081"
    read_only: true
    tmpfs:
      - /tmp
      - /fsss-spool
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  clamav:
    image: clamav/clamav:stable
    expose:
      - "3310"
    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/clamav
      - /var/log/clamav
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
